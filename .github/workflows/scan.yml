name: UK Deals Scan

on:
  schedule:
    # Off-peak minutes (:17, :47) to dodge the :00/:30 congestion that
    # causes GitHub's 10-30 min cron delays. Runs ~hourly, daytime UK.
    - cron: "17,47 7-22 * * *"
  workflow_dispatch:        # lets you run a scan on-demand from the Actions tab

# Keep only one scan running at a time.
concurrency:
  group: deals-scan
  cancel-in-progress: false

permissions:
  contents: write           # allows the keep-alive commit step

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scan
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ALERT_CHAT_ID: ${{ secrets.ALERT_CHAT_ID }}
          AWIN_FEED_URLS: ${{ secrets.AWIN_FEED_URLS }}
        run: python main.py

      # Refresh the public deals snapshot the website serves (docs/deals.json).
      # Best-effort: the script never fails the job, so a snapshot hiccup
      # can't take down the scan.
      - name: Export deals snapshot for the website
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python -m tools.export_deals

      - name: Commit deals snapshot (only when it changed)
        run: |
          git config user.name "deals-bot"
          git config user.email "deals-bot@users.noreply.github.com"
          git add docs/deals.json
          if git diff --cached --quiet; then
            echo "No deal changes to commit."
          else
            git commit -m "chore: update deals snapshot"
            git push || (git pull --rebase --autostash && git push) || true
          fi

      # Refresh discount-code snapshot (docs/vouchers.json). No-op unless
      # voucher_sources is enabled in config.yaml. Best-effort; robots.txt
      # is honoured per source.
      - name: Refresh discount codes
        run: python -m tools.export_vouchers

      - name: Commit codes snapshot (only when it changed)
        run: |
          git config user.name "deals-bot"
          git config user.email "deals-bot@users.noreply.github.com"
          git add docs/vouchers.json
          if git diff --cached --quiet; then
            echo "No code changes to commit."
          else
            git commit -m "chore: update codes snapshot"
            git push || (git pull --rebase --autostash && git push) || true
          fi

      # GitHub disables scheduled workflows after 60 days of repo inactivity.
      # This harmless monthly touch keeps the schedule alive.
      - name: Keep-alive (1st of month only)
        if: ${{ github.event_name == 'schedule' }}
        run: |
          if [ "$(date -u +%d)" = "01" ]; then
            git config user.name "deals-bot"
            git config user.email "deals-bot@users.noreply.github.com"
            date -u > .keepalive
            git add .keepalive
            git commit -m "chore: keep-alive" || exit 0
            git push || true
          fi

name: UK Deals Scan

on:
  schedule:
    - cron: "17,47 7-22 * * *"
  workflow_dispatch:

concurrency:
  group: deals-scan
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scan
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ALERT_CHAT_ID: ${{ secrets.ALERT_CHAT_ID }}
          AWIN_FEED_URLS: ${{ secrets.AWIN_FEED_URLS }}
        run: python main.py

      - name: Keep-alive (1st of month only)
        if: ${{ github.event_name == 'schedule' }}
        run: |
          if [ "$(date -u +%d)" = "01" ]; then
            git config user.name "deals-bot"
            git config user.email "deals-bot@users.noreply.github.com"
            date -u > .keepalive
            git add .keepalive
            git commit -m "chore: keep-alive" || exit 0
            git push || true
          fi

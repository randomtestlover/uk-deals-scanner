# ============================================================
#  UK DEALS SCANNER — CONFIG
#  This is the ONLY file you normally need to edit.
#  Secrets (tokens/keys) go in GitHub Secrets, NOT here.
# ============================================================

# --- Deal filtering -----------------------------------------
# A deal is only posted if it clears BOTH of these thresholds.
filters:
  min_discount_pct: 30      # ignore anything discounted less than this
  min_deal_score: 65        # 0-100 quality score (see core/dealscore.py)
  require_in_stock: true    # skip deals that look out of stock

# --- Posting behaviour --------------------------------------
posting:
  max_per_run: 8            # cap deals posted in a single scan (anti-spam)
  quiet_hours_utc: [23, 0, 1, 2, 3, 4, 5, 6]  # hours (UTC) to NOT post
  dry_run_default: false    # true = print to console, never post

# --- Amazon affiliate ---------------------------------------
affiliate:
  amazon_tag: "yourtag-21"  # <-- PUT YOUR AMAZON ASSOCIATES TAG HERE
  # Disclosure appended to every post (UK ASA + Amazon compliance).
  disclosure: "🔖 Affiliate links — we may earn a commission at no extra cost to you."

# --- Categories & their CamelCamelCamel UK source feeds -----
# CCC exposes free RSS feeds. 'top_drops' / 'recent_drops' are
# site-wide; category feeds use CCC's category IDs.
# Each category can map to its own Telegram channel (see channels).
categories:
  tech:
    enabled: true
    feeds:
      - "https://uk.camelcamelcamel.com/top_drops/feed?bp=1"   # biggest price drops
      - "https://uk.camelcamelcamel.com/recent/feed?bp=1"      # recent drops
    keywords_any: ["laptop", "ssd", "monitor", "tv", "headphone", "ssd", "gpu", "tablet", "phone", "router", "soundbar"]
  gaming:
    enabled: true
    feeds:
      - "https://uk.camelcamelcamel.com/top_drops/feed?bp=1"
    keywords_any: ["playstation", "ps5", "xbox", "nintendo", "switch", "game", "controller", "steam"]
  baby:
    enabled: true
    feeds:
      - "https://uk.camelcamelcamel.com/top_drops/feed?bp=1"
    keywords_any: ["nappy", "nappies", "pram", "pushchair", "cot", "baby", "infant", "toddler"]
  home:
    enabled: true
    feeds:
      - "https://uk.camelcamelcamel.com/top_drops/feed?bp=1"
    keywords_any: ["vacuum", "airfryer", "air fryer", "kettle", "coffee", "dyson", "mattress", "bedding"]

# --- Telegram channels --------------------------------------
# main_channel receives EVERYTHING (your public funnel — keep it PUBLIC).
# Per-category channels are optional; leave blank ("") to send only to main.
# Use the numeric chat ID (e.g. -1001234567890) or @channelusername.
channels:
  main_channel: "@your_main_deals_channel"
  per_category:
    tech: ""
    gaming: ""
    baby: ""
    home: ""

# --- Click tracking (Cloudflare Worker redirect) ------------
# Optional. If set, outgoing links route through your Worker so you
# can measure clicks before monetising. Leave blank to link direct.
click_tracking:
  enabled: false
  worker_base_url: ""       # e.g. "https://go.yourdomain.workers.dev"

# --- Scrape fallback (used only if a CCC feed fails) --------
scrape_fallback:
  enabled: true
  user_agent: "Mozilla/5.0 (compatible; UKDealsScanner/1.0; +https://example.com/bot)"
  min_delay_seconds: 6
  max_delay_seconds: 14
